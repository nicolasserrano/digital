<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transición de Globo 3D a Gráfica 2D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a16;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #btn-transition {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 36px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: transparent;
            border: 2px solid #00f0ff;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }

        #btn-transition:hover {
            background: #00f0ff;
            color: #0a0a16;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <button id="btn-transition">TRANSITION</button>
        <canvas id="stage"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn-transition');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- CONFIGURACIÓN DE PARTÍCULAS ---
        const numParticles = 2200;
        const particles = [];
        
        // Estado de la animación: 0 = Globo 3D, 1 = Gráfica 2D
        let transitionProgress = 0; 
        let targetProgress = 0; 
        let globusRotationY = 0; // Rotación constante del globo

        // Estructura de datos para cada partícula
        class Particle {
            constructor() {
                // 1. POSICIÓN EN LA ESFERA (Coordenadas esféricas convertidas a cartesianas 3D)
                const radius = 580;
                const theta = Math.random() * Math.PI * 2; // Ángulo horizontal
                const phi = Math.acos((Math.random() * 2) - 1); // Ángulo vertical (distribución uniforme)
                
                this.sphereX = radius * Math.sin(phi) * Math.cos(theta);
                this.sphereY = radius * Math.sin(phi) * Math.sin(theta);
                this.sphereZ = radius * Math.cos(phi);

                // 2. POSICIÓN EN LA GRÁFICA X-Y
                // Simulamos una distribución de "gráfica" (por ejemplo, ondas de datos estadísticos)
                const margin = 150;
                this.graphX = (Math.random() * (width - margin * 2)) + margin - width / 2;
                // Una función matemática para que parezca una gráfica con sentido
                const frequency = 0.01;
                this.graphY = (Math.sin(this.graphX * frequency) * 100) + (Math.random() * 40 - 20); 

                // Propiedades de estilo individuales
                this.size = Math.random() * 1.5 + 1;
                this.color = Math.random() > 0.5 ? '#00f0ff' : '#7000ff';
                
                // Velocidad individual de transición para que no se muevan todas a la vez (orgánico)
                this.delay = Math.random() * 0.4; 
            }

            draw() {
                // Rotar coordenadas 3D de la esfera en el eje Y
                const cosY = Math.cos(globusRotationY);
                const sinY = Math.sin(globusRotationY);
                
                // Rotación clásica 3D
                const rotatedX = this.sphereX * cosY - this.sphereZ * sinY;
                const rotatedZ = this.sphereX * sinY + this.sphereZ * cosY;
                const rotatedY = this.sphereY; 

                // Efecto de perspectiva 3D básico (proyección)
                const fov = 400; // Distancia focal
                const cameraDistance = 350;
                const scale3D = fov / (fov + rotatedZ + cameraDistance);
                const p3dX = rotatedX * scale3D;
                const p3dY = rotatedY * scale3D;

                // Interpolar con la velocidad individual modificada por el progreso global
                let p = (transitionProgress - this.delay) / (1 - this.delay);
                if (p < 0) p = 0;
                if (p > 1) p = 1;

                // Suavizado del movimiento individual (Easing OutExpo)
                const t = 1 - Math.pow(1 - p, 4);

                // Coordenadas finales interpoladas (De 3D a la Gráfica 2D)
                const finalX = (width / 2) + (p3dX * (1 - t) + this.graphX * t);
                const finalY = (height / 2) + (p3dY * (1 - t) + this.graphY * t);

                // Variar el brillo/opacidad según la profundidad en 3D
                const alpha = (1 - t) * ((rotatedZ + 180) / 360 * 0.7 + 0.3) + t * 0.8;

                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(finalX, finalY, this.size * (t * 0.5 + 1), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Inicializar partículas
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        // Dibujar los ejes de la gráfica cuando la transición avanza
        function drawGraphAxes() {
            if (transitionProgress < 0.1) return;
            
            ctx.strokeStyle = `rgba(255, 255, 255, ${transitionProgress * 0.15})`;
            ctx.lineWidth = 1;
            
            // Eje X
            ctx.beginPath();
            ctx.moveTo(100, height / 2);
            ctx.lineTo(width - 100, height / 2);
            ctx.stroke();

            // Eje Y
            ctx.beginPath();
            ctx.moveTo(width / 2, 100);
            ctx.lineTo(width / 2, height - 100);
            ctx.stroke();
        }

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 22, 0.2)'; // Rastro de movimiento sutil (motion blur)
            ctx.fillRect(0, 0, width, height);

            // Rotar globo continuamente si aún no está plano del todo
            if (transitionProgress < 0.95) {
                globusRotationY += 0.005;
            }

            // Transicionar suavemente hacia el objetivo
            transitionProgress += (targetProgress - transitionProgress) * 0.01;

            // Dibujar la rejilla de la gráfica en el fondo
            drawGraphAxes();

            // Dibujar partículas
            particles.forEach(p => p.draw());

            requestAnimationFrame(animate);
        }

        // --- CONTROL EVENTO ---
        btn.addEventListener('click', () => {
            if (targetProgress === 0) {
                targetProgress = 1;
                btn.innerText = "BACK TO WORLD GLOBE";
            } else {
                targetProgress = 0;
                btn.innerText = "TRANSITION";
            }
        });

        // Arrancar
        animate();
    </script>
</body>
</html>
