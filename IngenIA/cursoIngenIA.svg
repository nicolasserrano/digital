    <svg viewBox="0 0 900 550" fill="none" xmlns="http://www.w3.org/2000/svg">

          <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 950px;
            padding: 10px;
        }
        svg {
            width: 100%;
            height: auto;
        }

        /* Animación del flujo neón refinada */
        .neon-flow {
            /* Definimos un patrón de guiones: 12px línea, 8px espacio */
            stroke-dasharray: 12, 8;
            /* Animamos el desplazamiento del guión */
            animation: flowAnimation 0.5s linear infinite;
            stroke: #00f2ff;
            filter: drop-shadow(0 0 5px #00f2ff);
            stroke-width: 6px;
            stroke-linecap: round;
            fill: none;
        }

        @keyframes flowAnimation {
            from {
                stroke-dashoffset: 20; /* Suma de los valores de dasharray */
            }
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>

      <!-- DEFINICIONES -->
        <defs>
            <filter id="legoShadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.12"/>
            </filter>
            
            <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/>
            </linearGradient>
            <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/>
            </linearGradient>
            <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/>
            </linearGradient>
            <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/>
            </linearGradient>
        </defs>

        <!-- LÍNEAS DE CONEXIÓN -->
        <g stroke-width="8" stroke-linecap="round" fill="none">
            <!-- Capa base gris -->
            <path d="M 170 270 H 280" stroke="#cbd5e1" />
            <path d="M 460 270 H 510" stroke="#cbd5e1" />
            <path d="M 510 270 V 185 H 530" stroke="#cbd5e1" />
            <path d="M 510 270 V 330 H 530" stroke="#cbd5e1" />

            <!-- Capa de animación NEÓN -->
            <path d="M 170 270 H 280" class="neon-flow" />
            <path d="M 460 270 H 510" class="neon-flow" />
            <path d="M 510 270 V 185 H 530" class="neon-flow" />
            <path d="M 510 270 V 330 H 530" class="neon-flow" />
        </g>

        <!-- PIEZA: FORMATOS (INPUT) -->
        <g filter="url(#legoShadow)">
            <rect x="40" y="180" width="130" height="140" rx="12" fill="url(#gradGreen)" />
            <rect x="65" y="170" width="25" height="10" rx="3" fill="#059669" />
            <rect x="110" y="170" width="25" height="10" rx="3" fill="#059669" />
            <text x="105" y="225" font-size="24" text-anchor="middle">📥</text>
            <text x="105" y="255" fill="white" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">FORMATOS</text>
            <text x="105" y="275" fill="white" fill-opacity="0.9" font-family="sans-serif" font-size="10" text-anchor="middle">ENTRADA DATOS</text>
        </g>

        <!-- PIEZA CENTRAL: LLM -->
        <g filter="url(#legoShadow)">
            <rect x="280" y="190" width="180" height="120" rx="15" fill="#1e293b" />
            <text x="370" y="250" fill="white" font-family="sans-serif" font-size="48" font-weight="900" text-anchor="middle" letter-spacing="4">LLM</text>
            
            <!-- Etiquetas de flujo ajustadas -->
            <rect x="285" y="262" width="40" height="16" rx="8" fill="white" fill-opacity="0.15" />
            <text x="305" y="274" fill="white" font-family="sans-serif" font-weight="bold" font-size="8" text-anchor="middle">INPUT</text>
            
            <rect x="415" y="262" width="40" height="16" rx="8" fill="white" fill-opacity="0.15" />
            <text x="435" y="274" fill="white" font-family="sans-serif" font-weight="bold" font-size="8" text-anchor="middle">OUTPUT</text>

            <!-- Conectores superiores LLM -->
            <rect x="310" y="180" width="30" height="10" rx="3" fill="#334155" />
            <rect x="355" y="180" width="30" height="10" rx="3" fill="#334155" />
            <rect x="400" y="180" width="30" height="10" rx="3" fill="#334155" />
        </g>

        <!-- PIEZA: MODELOS (Soporte directo del LLM) -->
        <g filter="url(#legoShadow)">
            <rect x="280" y="310" width="180" height="70" rx="8" fill="url(#gradBlue)" />
            <rect x="295" y="310" width="150" height="5" fill="black" fill-opacity="0.1" />
            <text x="370" y="340" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">MODELOS</text>
            <text x="370" y="360" fill="white" fill-opacity="0.9" font-family="sans-serif" font-size="11" text-anchor="middle">Inteligencia Base</text>
        </g>

        <!-- PIEZA: PLATAFORMAS (BASE AJUSTADA) -->
        <g filter="url(#legoShadow)">
            <rect x="40" y="440" width="670" height="60" rx="12" fill="url(#gradRed)" />
            
            <!-- Conectores tipo Lego con espaciado uniforme -->
            <rect x="70" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="115" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="160" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="205" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="250" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="295" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="340" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="385" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="430" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="475" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="520" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="565" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="610" y="430" width="25" height="10" rx="3" fill="#dc2626" />
            <rect x="655" y="430" width="25" height="10" rx="3" fill="#dc2626" />

            <text x="375" y="470" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">PLATAFORMAS</text>
            <text x="375" y="488" fill="white" fill-opacity="0.9" font-family="sans-serif" font-size="10" text-anchor="middle">Entornos que soportan toda la arquitectura</text>
        </g>

        <!-- COLUMNA DE OUTPUT (DERECHA) -->
        
        <!-- OUTPUT 1: FORMATOS -->
        <g filter="url(#legoShadow)">
            <rect x="530" y="140" width="180" height="90" rx="12" fill="url(#gradGreen)" />
            <rect x="550" y="130" width="25" height="10" rx="3" fill="#059669" />
            <rect x="595" y="130" width="25" height="10" rx="3" fill="#059669" />
            <rect x="640" y="130" width="25" height="10" rx="3" fill="#059669" />
            <text x="565" y="195" font-size="24">📋</text>
            <text x="640" y="185" fill="white" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">FORMATOS</text>
            <text x="640" y="205" fill="white" fill-opacity="0.9" font-family="sans-serif" font-size="10" text-anchor="middle">SALIDA ÚTIL</text>
        </g>

        <!-- OUTPUT 2: HERRAMIENTAS -->
        <g filter="url(#legoShadow)">
            <rect x="530" y="270" width="180" height="120" rx="12" fill="url(#gradOrange)" />
            <rect x="550" y="260" width="25" height="10" rx="3" fill="#d97706" />
            <rect x="595" y="260" width="25" height="10" rx="3" fill="#d97706" />
            <rect x="640" y="260" width="25" height="10" rx="3" fill="#d97706" />
            <text x="620" y="310" font-size="24" text-anchor="middle">⚙️</text>
            <text x="620" y="340" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">HERRAMIENTAS</text>
            <text x="620" y="360" fill="white" fill-opacity="0.9" font-family="sans-serif" font-size="11" text-anchor="middle">Automatización</text>
        </g>

    </svg>
